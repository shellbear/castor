name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install xcodegen ffmpeg
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        run: |
          xcodebuild -project Castor.xcodeproj -scheme Castor \
            -configuration Debug -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO build
      - name: Engine tests
        run: swift test --package-path Packages/CastorEngine
